services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       bookshop
      POSTGRES_USER:     bookshop
      POSTGRES_PASSWORD: bookshop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookshop"]
      interval: 5s
      timeout: 5s
      retries: 5

  bookshop-srv:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      DB_URL:  jdbc:postgresql://postgres:5432/bookshop
      DB_USER: bookshop
      DB_PASS: bookshop
      SPRING_PROFILES_ACTIVE: cloud
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
