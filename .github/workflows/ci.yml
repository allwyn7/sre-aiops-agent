name: CI – Validate Fix PR

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git" .
          git checkout "${GITHUB_SHA}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-21-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-21-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Build and test (H2 in-memory)
        run: mvn -B verify --file app/pom.xml -Dspring.profiles.active=test

      - name: Check Flyway migration sequence
        run: |
          MIGRATION_DIR="app/src/main/resources/db/migration"
          if [ ! -d "$MIGRATION_DIR" ]; then exit 0; fi
          echo "Migration files:"
          ls "$MIGRATION_DIR"/V*.sql 2>/dev/null || echo "(none)"
          dupes=$(ls "$MIGRATION_DIR"/V*.sql 2>/dev/null \
            | grep -oP '(?<=V)\d+' | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "ERROR: Duplicate Flyway versions: $dupes"; exit 1
          fi
          echo "Migration sequence OK."

      - name: Post CI result as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_HOST: ${{ github.server_url == 'https://github.com' && 'github.com' || 'github.tools.sap' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            ICON="✅"; STATUS="passed"
          else
            ICON="❌"; STATUS="FAILED"
          fi
          gh pr comment "$PR_NUMBER" --body "## ${ICON} CI ${STATUS} — AIOps Fix PR

Build, tests, and Flyway sequence check completed.

> Review the diff, confirm the fix resolves the incident, then merge.
> _Generated by SRE AIOps Agent_"
