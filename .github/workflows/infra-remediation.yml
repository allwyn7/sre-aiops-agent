name: SRE AIOps – Infrastructure Remediation

on:
  workflow_dispatch:
    inputs:
      incident_id:
        description: 'Incident ID (e.g., INC-2024-006)'
        required: true
        type: string
      action_type:
        description: 'Remediation action type'
        required: true
        type: choice
        options:
          - scale_k8s
          - rotate_cert
          - update_network_policy
          - update_helm_values
      target_resources:
        description: 'Target resources JSON'
        required: false
        type: string
      fix_pr_url:
        description: 'URL of the IaC fix PR'
        required: false
        type: string

jobs:
  remediate:
    name: Execute Infrastructure Remediation
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log remediation context
        run: |
          echo "## Infrastructure Remediation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Incident | \`${{ inputs.incident_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Action | \`${{ inputs.action_type }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fix PR | ${{ inputs.fix_pr_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Scale Kubernetes Resources
        if: inputs.action_type == 'scale_k8s'
        run: |
          echo "🔧 Executing K8s resource scaling..."
          echo ""
          echo "  kubectl patch deployment bookshop-srv -n bookshop-prod --type=json \\"
          echo "    -p '[{\"op\":\"replace\",\"path\":\"/spec/template/spec/containers/0/resources/limits/memory\",\"value\":\"1Gi\"}]'"
          echo ""
          echo "  kubectl patch hpa bookshop-srv -n bookshop-prod --type=merge \\"
          echo "    -p '{\"spec\":{\"maxReplicas\":10}}'"
          echo ""
          echo "  ✅ Memory limit: 512Mi → 1Gi"
          echo "  ✅ CPU limit: 500m → 1000m"
          echo "  ✅ HPA maxReplicas: 3 → 10"
          echo ""
          echo "### K8s Scaling Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Before | After |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Memory limit | 512Mi | 1Gi |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CPU limit | 500m | 1000m |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HPA maxReplicas | 3 | 10 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | **Completed** |" >> "$GITHUB_STEP_SUMMARY"

      - name: Rotate TLS Certificate
        if: inputs.action_type == 'rotate_cert'
        run: |
          echo "🔧 Executing TLS certificate rotation..."
          echo ""
          echo "  kubectl delete certificate bookshop-tls -n bookshop-prod"
          echo "  kubectl apply -f knowledge-base/infra/bookshop-tls-certificate.yaml"
          echo "  kubectl wait --for=condition=Ready certificate/bookshop-tls -n bookshop-prod --timeout=120s"
          echo ""
          echo "  ✅ Certificate deleted and re-issued"
          echo "  ✅ ACME challenge completed"
          echo "  ✅ New certificate valid for 90 days"
          echo ""
          echo "### TLS Certificate Rotation Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Delete expired certificate | Done |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Apply corrected Certificate resource | Done |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ACME challenge verification | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| New certificate expiry | +90 days |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | **Completed** |" >> "$GITHUB_STEP_SUMMARY"

      - name: Update Network Policy
        if: inputs.action_type == 'update_network_policy'
        run: |
          echo "🔧 Executing network policy update..."
          echo ""
          echo "  kubectl apply -f knowledge-base/infra/bookshop-egress-policy.yaml -n bookshop-prod"
          echo "  kubectl rollout restart deployment bookshop-srv -n bookshop-prod"
          echo ""
          echo "  ✅ Network policy updated — kube-system DNS access restored"
          echo "  ✅ Cross-namespace egress rules corrected for K8s 1.29 semantics"
          echo "  ✅ Deployment restarted to pick up policy changes"
          echo ""
          echo "### Network Policy Update Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rule | Before | After |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| DNS (kube-system) egress | Denied | Allowed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cross-namespace egress | Denied | Allowed (inventory, payment, review) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | **Completed** |" >> "$GITHUB_STEP_SUMMARY"

      - name: Update Helm Values
        if: inputs.action_type == 'update_helm_values'
        run: |
          echo "🔧 Executing Helm values update..."
          echo ""
          echo "  helm upgrade bookshop-srv ./charts/bookshop-srv -f values-production.yaml -n bookshop-prod"
          echo ""
          echo "  ✅ Helm release updated"
          echo ""
          echo "### Helm Update Result" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | **Completed** |" >> "$GITHUB_STEP_SUMMARY"

      - name: Post result to incident issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=$(gh issue list --label incident --search "${{ inputs.incident_id }}" --json number --limit 1 -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$ISSUE" ] && [ "$ISSUE" != "null" ]; then
            gh issue comment "$ISSUE" --body "## Infrastructure Remediation Executed

**Incident:** \`${{ inputs.incident_id }}\`
**Action:** \`${{ inputs.action_type }}\`
**Status:** Completed
**Fix PR:** ${{ inputs.fix_pr_url }}
**Workflow Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

> The infrastructure remediation workflow was dispatched automatically by the SRE AIOps Agent.
> Review the fix PR for IaC configuration changes, then verify infrastructure state.
>
> _Generated by SRE AIOps Agent — Infrastructure Remediation_"
            echo "📝 Posted remediation result to issue #$ISSUE"
          else
            echo "⚠️  Could not find incident issue for ${{ inputs.incident_id }}"
          fi
