name: SRE AIOps – Repair Failed Fix

on:
  workflow_run:
    workflows: ["CI – Validate Fix PR"]
    types: [completed]

jobs:
  repair:
    name: Auto-Repair Failed Fix PR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read

    steps:
      - name: Find the failed PR
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_HOST: ${{ github.server_url == 'https://github.com' && 'github.com' || 'github.tools.sap' }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          # Only handle agent fix branches
          if [[ ! "$BRANCH" == fix/* ]]; then
            echo "Branch '$BRANCH' is not an agent fix branch. Skipping."
            echo "should_repair=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find the open PR for this branch
          PR_JSON=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number,labels --limit 1)
          PR_NUMBER=$(echo "$PR_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['number'] if d else '')" 2>/dev/null)

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch '$BRANCH'. Skipping."
            echo "should_repair=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Loop protection: don't repair a repair
          HAS_REPAIR_LABEL=$(echo "$PR_JSON" | python3 -c "
import sys, json
d = json.load(sys.stdin)
labels = [l['name'] for l in d[0].get('labels', [])] if d else []
print('true' if 'aiops-repair' in labels else 'false')
")

          if [ "$HAS_REPAIR_LABEL" = "true" ]; then
            echo "PR #$PR_NUMBER is already a repair attempt. Posting human-help comment."
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "## ⚠️ Repair Also Failed

The auto-repaired fix also failed CI. This incident needs human intervention.

> _SRE AIOps Agent — repair loop halted to prevent infinite retries._"
            echo "should_repair=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found failed PR #$PR_NUMBER. Triggering repair."
          echo "should_repair=true" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Checkout repository
        if: steps.find-pr.outputs.should_repair == 'true'
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git" .
          git checkout "${GITHUB_SHA}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install agent dependencies
        if: steps.find-pr.outputs.should_repair == 'true'
        run: npm ci
        working-directory: agent

      - name: Run Repair Agent
        if: steps.find-pr.outputs.should_repair == 'true'
        id: repair
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL:     ${{ github.api_url }}
          GITHUB_REPO:        ${{ github.repository }}
          FAILED_PR_NUMBER:   ${{ steps.find-pr.outputs.pr_number }}
          FAILED_RUN_ID:      ${{ steps.find-pr.outputs.run_id }}
        run: node repair.js
        working-directory: agent

      - name: Write job summary
        if: always() && steps.find-pr.outputs.should_repair == 'true'
        run: |
          echo "## SRE AIOps – Repair Agent" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Failed PR | #${{ steps.find-pr.outputs.pr_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Repair PR | ${{ steps.repair.outputs.repair_pr_url }} |" >> $GITHUB_STEP_SUMMARY
