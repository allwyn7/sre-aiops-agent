name: SRE AIOps – Repair Failed Fix

on:
  workflow_run:
    workflows: ["CI – Validate Fix PR"]
    types: [completed]

jobs:
  repair:
    name: Auto-Repair Failed Fix PR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read

    steps:
      - name: Find the failed PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            // Get the PR associated with the failed workflow run
            const run = context.payload.workflow_run;
            const branch = run.head_branch;

            // Check if this is an agent-generated fix branch
            if (!branch.startsWith('fix/')) {
              core.info(`Branch "${branch}" is not an agent fix branch. Skipping.`);
              core.setOutput('should_repair', 'false');
              return;
            }

            // Find the open PR for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (prs.length === 0) {
              core.info('No open PR found for this branch. Skipping.');
              core.setOutput('should_repair', 'false');
              return;
            }

            const pr = prs[0];
            const labels = pr.labels.map(l => l.name);

            // Loop protection: don't repair a repair
            if (labels.includes('aiops-repair')) {
              core.info('PR is already a repair attempt. Posting human-help comment.');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '## ⚠️ Repair Also Failed\n\nThe auto-repaired fix also failed CI. This incident needs human intervention.\n\n> _SRE AIOps Agent — repair loop halted to prevent infinite retries._'
              });
              core.setOutput('should_repair', 'false');
              return;
            }

            core.info(`Found failed PR #${pr.number}: "${pr.title}"`);
            core.setOutput('should_repair', 'true');
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('run_id', String(run.id));

      - name: Checkout repository
        if: steps.find-pr.outputs.should_repair == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        if: steps.find-pr.outputs.should_repair == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Install agent dependencies
        if: steps.find-pr.outputs.should_repair == 'true'
        run: npm ci
        working-directory: agent

      - name: Run Repair Agent
        if: steps.find-pr.outputs.should_repair == 'true'
        id: repair
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:        ${{ github.repository }}
          FAILED_PR_NUMBER:   ${{ steps.find-pr.outputs.pr_number }}
          FAILED_RUN_ID:      ${{ steps.find-pr.outputs.run_id }}
        run: node repair.js
        working-directory: agent

      - name: Write job summary
        if: always() && steps.find-pr.outputs.should_repair == 'true'
        run: |
          echo "## SRE AIOps – Repair Agent" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Failed PR | #${{ steps.find-pr.outputs.pr_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Repair PR | ${{ steps.repair.outputs.repair_pr_url }} |" >> $GITHUB_STEP_SUMMARY
