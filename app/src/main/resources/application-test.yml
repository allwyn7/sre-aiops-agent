spring:
  datasource:
    url:      jdbc:h2:mem:bookshop;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false   # H2 uses ddl-auto; Flyway only runs against real PostgreSQL
