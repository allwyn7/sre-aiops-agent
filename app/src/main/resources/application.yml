spring:
  datasource:
    url:      ${DB_URL:jdbc:postgresql://localhost:5432/bookshop}
    username: ${DB_USER:bookshop}
    password: ${DB_PASS:bookshop}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate   # Schema must match entity — Flyway manages migrations
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.sap.demo: INFO
    org.hibernate.SQL: WARN
