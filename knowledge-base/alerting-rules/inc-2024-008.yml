# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-008 — bookshop-srv: Inter-service communication failure — DNS timeouts after cluster upgrade
# Date: 2024-05-01

groups:
  - name: NetworkIncidentDetection
    rules:
      - alert: HighDNSFailureRate
        expr: dns_resolution_failure_rate_percent > 5
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: 'High DNS failure rate detected in {{ $labels.namespace }}.'
          description: 'DNS resolution failure rate is above threshold: {{ $value }}%. Investigate network policies and CoreDNS logs.'
          runbook_url: 'https://example.com/runbooks/network-dns-failure'
      - alert: WarningDNSFailureRate
        expr: dns_resolution_failure_rate_percent > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: 'Warning: Elevated DNS failure rate in {{ $labels.namespace }}.'
          description: 'DNS failure rate nearing critical levels: {{ $value }}%.'
          runbook_url: 'https://example.com/runbooks/network-dns-failure'
      - alert: NetworkPolicyDenySpike
        expr: rate(network_policy_deny_count_per_min[2m]) > 50
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Spike in network policy denies in {{ $labels.namespace }}.'
          description: 'High number of policy denies detected: {{ $value }} events/min. Verify network policies are correctly configured after recent changes.'
          runbook_url: 'https://example.com/runbooks/network-policy-issues'
      - alert: InterServiceTimeouts
        expr: inter_service_timeout_rate_per_min > 5
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: 'High inter-service timeout rate in {{ $labels.namespace }}.'
          description: 'Services experiencing timeouts for inter-service calls at a rate of {{ $value }} per minute. Verify downstream services and network configuration.'
          runbook_url: 'https://example.com/runbooks/inter-service-timeouts'
