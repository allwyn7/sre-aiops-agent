# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-003 — bookshop-srv: request timeouts on GET /api/books – N+1 query explosion after BookRepository change
# Date: 2024-04-12

groups:
  - name: application_alerts
    rules:
      - alert: HighDBQueryPerRequest
        expr: avg_over_time(db_queries_per_request[1m]) > 5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High database query count per request ({{ $value }})"
          description: "Database queries per request have spiked above normal levels. Check for potential N+1 issues in Hibernate configurations or service code. Check runbook for incident resolution guidelines."
          runbook_url: "https://company.runbooks/nplus1-errors"

      - alert: CriticalDBConnectionPoolExhausted
        expr: hikari_connection_pool_active >= hikari_connection_pool_size
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical - DB connection pool exhausted."
          description: "Active database connections have reached the configured limit. Requests may fail due to database connection timeouts. Immediate action required. Check `HikariCP` configuration and database queries for potential inefficiencies."
          runbook_url: "https://company.runbooks/hikaricp-tuning"

  - route:
     receiver: 'critical_pager'
     match:
       severity: 'critical'

  - route:
     receiver: 'oncall_channel'
     match:
       severity: 'warning'
