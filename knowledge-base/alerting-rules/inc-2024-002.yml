# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-002 — bookshop-srv: HTTP 500 spike – Hibernate SQLGrammarException on Books endpoint
# Date: 2024-04-10

groups:
  - name: bookshop_alerts
    rules:
      - alert: HighHTTPErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[1m]) > 1.0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate detected in bookshop-srv"
          description: "HTTP 500 rate exceeded threshold ({{ $value }}) on endpoints {{ $labels.path }}. Investigate immediately."
          runbook_url: "https://your-runbook-url"
      - alert: WarningHTTPErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[1m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated HTTP error rate in bookshop-srv"
          description: "HTTP 500 rate {{ $value }} is above normal baseline. Investigate potential issues."
          runbook_url: "https://your-runbook-url"
  routes:
    - matchers:
        - severity=critical
      group_by: [alertname]
      receiver: critical_teams
      continue: true
    - matchers:
        - severity=warning
      group_by: [alertname]
      receiver: sres
