# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-002 — bookshop-srv: HTTP 500 spike – Hibernate SQLGrammarException on Books endpoint
# Date: 2024-04-10

groups:
  - name: bookshop-alerts
    rules:
      - alert: HighHttp5xxRate
        expr: rate(http_server_requests{status_code=~'5.*', app='bookshop-srv'}[1m]) > 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 500 error rate on bookshop-srv detected."
          description: "The HTTP 500 error rate on bookshop-srv has exceeded 1 error/min. Immediate action is required to restore service."
          runbook_url: "https://your-runbook-link/documentation"

      - alert: HttpErrorWarning
        expr: rate(http_server_requests{status_code=~'5.*', app='bookshop-srv'}[1m]) > 0.4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated HTTP 500 error rate on bookshop-srv detected."
          description: "The HTTP 500 error rate on bookshop-srv has exceeded 0.4 error/min. Investigate before it impacts users."
          runbook_url: "https://your-runbook-link/documentation"

