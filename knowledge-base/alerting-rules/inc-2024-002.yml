# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-002 — bookshop-srv: HTTP 500 spike – Hibernate SQLGrammarException on Books endpoint
# Date: 2024-04-10

groups:
  - name: BookshopAlerts
    rules:
      - alert: HighHTTP500Rate
        expr: rate(http_server_requests_error_total{app="bookshop"}[1m]) > 1
        for: 3m
        labels:
          severity: critical
          app: bookshop
          environment: production
        annotations:
          summary: High HTTP 500 error rate detected for Bookshop service
          description: The HTTP 500 error rate for endpoints /api/books exceeded the baseline and the accepted threshold (1 error/minute).
          runbook_url: https://runbooks.example.com/JPA_Entity_Schema_Drift_Recovery
      - alert: WarningHTTP500Rate
        expr: rate(http_server_requests_error_total{app="bookshop"}[1m]) > 0.5
        for: 5m
        labels:
          severity: warning
          app: bookshop
          environment: production
        annotations:
          summary: Elevated HTTP 500 error rate detected for Bookshop service
          description: The HTTP 500 error rate for endpoints /api/books is elevated and nearing the critical threshold.
          runbook_url: https://runbooks.example.com/JPA_Entity_Schema_Drift_Recovery
routes:
  - match:
      severity: critical
    continue: false
    receiver: ops-team
  - match:
      severity: warning
    continue: true
    receiver: dev-team
