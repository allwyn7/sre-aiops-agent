# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-002 — bookshop-srv: HTTP 500 spike – Hibernate SQLGrammarException on Books endpoint
# Date: 2024-04-10

groups:
  - name: bookshop
    rules:
      - alert: HighHttp5xxRate
        expr: increase(http_5xx_rate_per_min[1m]) > 1.0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HTTP 500 rate exceeds threshold"
          description: "HTTP 500 errors exceed threshold of 1 request per minute. Investigate logs and affected endpoints."
          runbook_url: "https://example.com/runbook-http-500"
      - alert: WarningHttp5xxRate
        expr: increase(http_5xx_rate_per_min[1m]) > 0.6
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Potential increase in HTTP 500 errors"
          description: "HTTP 500 errors exceed warning threshold. Investigate if rate persists or increases."
          runbook_url: "https://example.com/runbook-http-500"
