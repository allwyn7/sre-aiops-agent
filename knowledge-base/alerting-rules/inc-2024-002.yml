groups:
  - name: bookshop-srv-alerts
    rules:
      - alert: High_HTTP_500_Rate
        expr: sum(rate(http_requests_total{status=~"5.."}[1m])) > 50
        for: 2m
        labels:
          severity: P1
        annotations:
          summary: High rate of HTTP 500 errors in bookshop-srv
          description: "HTTP 500 errors exceed 50/min. Investigate possible schema drift or backend service issues."
