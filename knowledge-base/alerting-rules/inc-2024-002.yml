# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-002 — bookshop-srv: HTTP 500 spike – Hibernate SQLGrammarException on Books endpoint
# Date: 2024-04-10

groups:
  - name: bookshop_alerts
    rules:
      - alert: HighHTTP500RateOnBooksAPI
        expr: rate(http_server_requests_seconds_count{status=~"5..",app="bookshop"}[1m]) > 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical: High HTTP 500 rate on Books API"
          description: "HTTP 500 errors on /api/books endpoints exceeded 1 req/s (threshold: 0.6 req/s). Investigate for possible issues in Book JPA entity or database schema. [Runbook Link](http://your-runbook-url)."
      - alert: ElevatedHTTP500RateOnBooksAPI
        expr: rate(http_server_requests_seconds_count{status=~"5..",app="bookshop"}[1m]) > 0.6
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Warning: Elevated HTTP 500 rate on Books API"
          description: "HTTP 500 errors are approaching the critical threshold on /api/books endpoints. Review application health for potential issues."
  - name: health_check_alerts
    rules:
      - alert: BookshopServiceDown
        expr: probe_success{job="kubernetes",app="bookshop"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Critical: Bookshop service is DOWN"
          description: "Bookshop service /actuator/health is reporting status DOWN. Investigate database connectivity or service readiness issues."

