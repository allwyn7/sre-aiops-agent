# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-002 — INC-2024-002
# Date: 2024-04-10

groups:
- name: bookshop-http-alerts
  rules:
  - alert: High5xxRate
    expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (endpoint) > 20
    for: 2m
    labels:
      severity: critical
      service: bookshop-srv
    annotations:
      summary: "High rate of 5xx responses for Bookshop service endpoint {{ $labels.endpoint }}"
      description: |
        High HTTP 5xx error rate (> 20 per minute) detected on Bookshop service endpoint {{ $labels.endpoint }}.
        Investigate logs for root cause (e.g., SQL exceptions, misconfigurations).
