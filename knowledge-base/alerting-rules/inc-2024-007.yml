# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-007 — bookshop-srv: HTTPS handshake failures — TLS certificate expired on ingress
# Date: 2024-04-28

groups:
  - name: cert_manager_alerts
    rules:
      - alert: CertificateExpiryWarning
        expr: (tls_cert_expiry_days < 7) and (tls_cert_expiry_days > 1)
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS Certificate for {{ $labels.namespace }}/{{ $labels.certificate }} is nearing expiry."
          description: "The TLS certificate {{ $labels.certificate }} is expiring in {{ $value }} days. Take proactive action to ensure renewal."
          runbook_url: "https://runbook.example.com/cert-expiry"

      - alert: CertificateExpiryCritical
        expr: tls_cert_expiry_days < 1
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "TLS Certificate for {{ $labels.namespace }}/{{ $labels.certificate }} is about to expire."
          description: "The TLS certificate {{ $labels.certificate }} is expiring in less than 24 hours. Immediate action is required."
          runbook_url: "https://runbook.example.com/cert-expiry"

      - alert: HTTPSHandshakeFailures
        expr: https_handshake_failure_rate_per_min > 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High rate of HTTPS handshake failures on {{ $labels.ingress }}."
          description: "{{ $value }} HTTPS handshake failures per minute observed on {{ $labels.ingress }}. Investigate potential TLS certificate issues."
          runbook_url: "https://runbook.example.com/tls-issue"

routes:
  - matchers:
      - severity=critical
    receiver: "critical_pager"
  - matchers:
      - severity=warning
    receiver: "warning_notifications"

