# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-004 — bookshop-srv: HTTP 401/403 on all endpoints – XSUAA token validation failing after security config change
# Date: 2024-04-14

groups:
  - name: xsuaa_authentication_alerts
    rules:
      - alert: XSUAAAuthFailureCritical
        expr: http_401_rate_per_min > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical: XSUAA authentication failures exceeding threshold."
          description: "XSUAA authentication via JWT has failed consistently across multiple endpoints. A potential audience mismatch or XSUAA configuration error is occurring. Please investigate the XSUAA configuration and logs."
          runbook_url: "https://your-docs-url.com/xsuaa-mismatch-troubleshooting"
      - alert: XSUAAAuthFailureWarning
        expr: http_401_rate_per_min > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Warning: XSUAA authentication failures exceed baseline"
          description: "XSUAA token validation issues have started to spike above normal thresholds. Investigate the XSUAA server and service bindings."
          runbook_url: "https://your-docs-url.com/xsuaa-mismatch-troubleshooting"
