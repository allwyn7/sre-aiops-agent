# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-001 — bookshop-srv: OutOfMemoryError – unbounded in-memory cache in BookService
# Date: 2024-04-08

groups:
  - name: JVM_Alerts
    rules:
      - alert: HighHeapUsage
        expr: jvm_heap_used_percent > 70
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High JVM heap usage detected.
          description: JVM heap usage has exceeded 70%.
          runbook_url: https://runbook.example.com/high-heap-usage
      - alert: CriticalHeapUsage
        expr: jvm_heap_used_percent > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Critical JVM heap usage detected.
          description: JVM heap usage has exceeded 90%, risk of OOMError and service disruption.
          runbook_url: https://runbook.example.com/heap-oomerror
  - name: Pod_Stability_Alerts
    rules:
      - alert: PodRestartLoop
        expr: pod_restarts_last_hour > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Pod restart loop detected.
          description: Pods are restarting frequently (>10 restarts/hour), indicating service instability.
          runbook_url: https://runbook.example.com/restart-loop
routes:
  - match:
      severity: critical
    group_by: ['alertname']
    receiver: 'oncall'
  - match:
      severity: warning
    group_by: ['alertname']
    receiver: 'team_notifications'
