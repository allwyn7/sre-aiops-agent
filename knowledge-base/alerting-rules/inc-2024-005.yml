# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-005 — INC-2024-005
# Date: 2024-04-22

groups:
  - name: hana-connection-pool-rules
    rules:
      - alert: HANAConnectionPoolExhausted
        expr: hana_pool_active_connections == hana_pool_max_connections and hana_pool_queue_depth > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HANA connection pool is exhausted"
          description: "All {{ $value }} connections are active with a queue depth of {{ $labels.hana_pool_queue_depth }}. Investigate potential excessive query activity."
