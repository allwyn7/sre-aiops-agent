# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-006 — bookshop-srv: Pods CrashLoopBackOff — OOMKilled after traffic spike
# Date: 2024-04-25

groups:
  - name: "bookshop-srv-alerts"
    rules:
      - alert: "PodMemoryUsageHigh"
        expr: sum(container_memory_usage_bytes{namespace="bookshop-prod", pod=~"bookshop-srv.*"}) / sum(kube_pod_container_resource_limits_memory_bytes{namespace="bookshop-prod", container="bookshop-srv"}) > 0.9
        for: 2m
        labels:
          severity: "warning"
        annotations:
          summary: "High memory usage on bookshop-srv pods"
          description: "Memory usage exceeds 90% of container limits. Investigate for memory leaks or increase memory limits."
          runbook_url: "https://runbook-link"

      - alert: "HPANearMax"
        expr: kube_hpa_status_desired_replicas{namespace="bookshop-prod", hpa="bookshop-srv"} >= (0.8 * kube_hpa_spec_max_replicas{namespace="bookshop-prod", hpa="bookshop-srv"})
        for: 3m
        labels:
          severity: "critical"
        annotations:
          summary: "HPA scaling near maximum capacity"
          description: "HPA for bookshop-srv is nearing its maxReplicas limit."
          runbook_url: "https://runbook-link"

      - alert: "HighErrorRate"
        expr: rate(http_requests_total{service="bookshop-srv", status=~"5.."}[2m]) / rate(http_requests_total{service="bookshop-srv"}[2m]) > 0.05
        for: 2m
        labels:
          severity: "critical"
        annotations:
          summary: "High error rate on critical endpoints"
          description: "HTTP 5xx rate exceeds 5% of all requests for bookshop-srv. Investigate service health."
          runbook_url: "https://runbook-link"

