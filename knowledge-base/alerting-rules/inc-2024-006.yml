# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-006 — bookshop-srv: Pods CrashLoopBackOff — OOMKilled after traffic spike
# Date: 2024-04-25

groups:
  - name: infrastructure-alerts
    rules:
      - alert: HighMemoryUsage
        expr: container_memory_working_set_bytes / container_memory_limit_bytes > 0.8
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage, threshold exceeded ({{ $value }})"
          description: "A container's memory usage exceeds 80% of its limit. Investigate scaling and memory usage."
          runbook_url: "https://example.com/runbook/oomkilled"
      - alert: CriticalMemoryUsage
        expr: container_memory_working_set_bytes / container_memory_limit_bytes > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Memory usage critically high, nearing limit ({{ $value }})"
          description: "A container's memory usage exceeds 95% of its limit. Immediate intervention required."
          runbook_url: "https://example.com/runbook/oomkilled"
      - alert: HPAMaxedOut
        expr: kube_horizontalpodautoscaler_status_current_replicas >= kube_horizontalpodautoscaler_spec_max_replicas
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "HPA maxed out for {{ $labels.namespace }}/{{ $labels.deployment }}."
          description: "The Horizontal Pod Autoscaler can't scale further due to max replica limit."
          runbook_url: "https://example.com/runbook/hpa-maxed-out"
  - route:
      receiver: critical-alerts
      group_by: ['alertname']
      matchers:
        - severity=~"warning|critical"
      continue: true

