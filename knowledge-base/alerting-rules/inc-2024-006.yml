# Alerting rules generated by SRE AIOps Agent
# Incident: INC-2024-006 — bookshop-srv: Pods CrashLoopBackOff — OOMKilled after traffic spike
# Date: 2024-04-25

groups:
  - name: bookshop-srv-alerts
    rules:
      - alert: PodMemoryUsageCritical
        expr: container_memory_working_set_bytes{namespace="bookshop-prod", pod=~"bookshop-srv.*"} > 480Mi
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Pod memory usage critical for bookshop-srv"
          description: "Pod {{ $labels.pod }} is using >480Mi memory, close to the limit of 512Mi, in namespace {{ $labels.namespace }}. Consider increasing memory limits."
          runbook_url: "https://runbooks.example.com/POD_MEMORY_CRASH"

      - alert: PodCrashLooping
        expr: changes(kube_pod_container_status_restarts_total{namespace="bookshop-prod", pod=~"bookshop-srv.*", container="bookshop-srv"}[5m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod in CrashLoopBackOff ({{ $labels.pod }})"
          description: "Pod {{ $labels.pod }} has restarted multiple times within a short period. Investigate possible resource exhaustion or configuration issues."
          runbook_url: "https://runbooks.example.com/POD_CRASHLOOPING"

      - alert: NodeMemoryPressure
        expr: kube_node_status_condition{condition="MemoryPressure", status="true"} > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Node memory pressure warning"
          description: "Node {{ $labels.node }} is experiencing memory pressure. Consider scaling the node pool or adjusting resource configurations."
          runbook_url: "https://runbooks.example.com/NODE_MEMORY_PRESSURE"

  - name: alertmanager-routing
    routes:
    - match:
        severity: critical
      receiver: critical-notifications
    - match:
        severity: warning
      receiver: warning-notifications
